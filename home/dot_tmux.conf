##### SETTINGS
# terminal
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm*:TC"
setw -g xterm-keys on

# controls
set -s escape-time 0
setw -g mode-keys vi
set -g mouse on

##### BINDINGS
# prefix
unbind C-b
set -g prefix BTab
bind-key BTab send-prefix

# navigation
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|n?vim?x?)(-wrapped)?(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' { if -F '#{pane_at_left}' '' 'select-pane -L' }
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' { if -F '#{pane_at_top}' '' 'select-pane -U' }
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' { if -F '#{pane_at_right}' '' 'select-pane -R' }
# bind-key -n 'C-n' if-shell "$is_vim" 'send-keys C-n' { if -F '#{window_end_flag}' '' 'select-window -n' }
# bind-key -n 'C-p' if-shell "$is_vim" 'send-keys C-p' { if 'test #{window_index} -gt #{base-index}' 'select-window -p' }

bind-key -T copy-mode-vi 'C-h' if -F '#{pane_at_left}' '' 'select-pane -L'
bind-key -T copy-mode-vi 'C-j' if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key -T copy-mode-vi 'C-k' if -F '#{pane_at_top}' '' 'select-pane -U'
bind-key -T copy-mode-vi 'C-l' if -F '#{pane_at_right}' '' 'select-pane -R'
# bind-key -T copy-mode-vi 'C-n' if -F '#{window_end_flag}' '' 'select-window -n'
# bind-key -T copy-mode-vi 'C-p' if 'test #{window_index} -gt #{base-index}' 'select-window -p'

# resize
bind -n 'M-h' if-shell "$is_vim" 'send-keys M-h' 'resize-pane -L 1'
bind -n 'M-j' if-shell "$is_vim" 'send-keys M-j' 'resize-pane -D 1'
bind -n 'M-k' if-shell "$is_vim" 'send-keys M-k' 'resize-pane -U 1'
bind -n 'M-l' if-shell "$is_vim" 'send-keys M-l' 'resize-pane -R 1'

bind-key -T copy-mode-vi M-h resize-pane -L 1
bind-key -T copy-mode-vi M-j resize-pane -D 1
bind-key -T copy-mode-vi M-k resize-pane -U 1
bind-key -T copy-mode-vi M-l resize-pane -R 1

# swap
bind -n 'C-S-h' if-shell "$is_vim" 'send-keys C-M-h' 'swap-pane -s "{left-of}"'
bind -n 'C-S-j' if-shell "$is_vim" 'send-keys C-M-j' 'swap-pane -s "{down-of}"'
bind -n 'C-S-k' if-shell "$is_vim" 'send-keys C-M-k' 'swap-pane -s "{up-of}"'
bind -n 'C-S-l' if-shell "$is_vim" 'send-keys C-M-l' 'swap-pane -s "{right-of}"'

bind-key -T copy-mode-vi C-M-h swap-pane -s "{left-of}"
bind-key -T copy-mode-vi C-M-j swap-pane -s "{down-of}"
bind-key -T copy-mode-vi C-M-k swap-pane -s "{up-of}"
bind-key -T copy-mode-vi C-M-l swap-pane -s "{right-of}"

# selection mode
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line

# yank
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'r' send -X rectangle-toggle

# search
bind-key / copy-mode \; send-key ?

# reload config
bind R source-file ~/.tmux.conf


# FROM GPT - NEED VERIFICATION (uncommented ones were tested)

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# Ensure window index numbers are updated when a window is closed
set -g renumber-windows on

# # Improve escape time for Neovim responsiveness
# set -s escape-time 0
#
#
#  # Open new terminal (window) with Meta+Enter
# bind-key -n M-Enter new-window -c "#{pane_current_path}"

# Navigation: Switch to windows 1-10 using Meta + Number
# Note: M-0 is mapped to window 10
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9
bind-key -n M-0 select-window -t 10


 # NAVIGATION: prev / next (Matches your tabLeader j/k)
bind j previous-window          # Select previous window
bind k next-window              # Select next window

# NAVIGATION: first / last (Matches your tabLeader J/K)
bind J select-window -t :1      # Jump to first window
bind K select-window -t :$      # Jump to last window

# MOVE: step (Matches your tabLeader h/l)
bind h swap-window -t -1\; select-window -t -1  # Move window left
bind l swap-window -t +1\; select-window -t +1  # Move window right

# CREATE / CLOSE (Matches your tabLeader n/q)
bind n new-window -c "#{pane_current_path}"     # Create new window
bind q confirm-before -p "kill-window #W? (y/n)" kill-window # Close window

# RENAME (Matches your tabLeader r)
bind r command-prompt -I "#W" "rename-window '%%'"

 # Vertical and Horizontal splits using | and -
unbind '"'
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Close current pane (similar to bufLeader q)
bind d kill-pane


# NOT WELL TESTED

# [NEW] Clipboard & SSH (OSC 52)
# This allows yanking in Neovim/Tmux to reach your local system clipboard over SSH
set -g set-clipboard on
# Allow programs in the pane to bypass tmux (useful for some image previews/clips)
set -g allow-passthrough on
 #
 ##### [NEW] SESSION & PANE MANAGEMENT
# Detach from session (Leaves everything running)
# Since 'd' is used for kill-pane, we use 'D' for Detach
bind D detach

# Zoom pane (Toggles the current pane to full screen)
# This is incredibly useful for looking at logs or code temporarily
bind m resize-pane -Z

# Session Switcher (Opens a menu to switch between sessions)
bind s choose-session

# Rename Session
bind S command-prompt -I "#S" "rename-session '%%'"

# Alternative for terminal clear screen
bind -n "C-S-x" send-keys 'C-l'
