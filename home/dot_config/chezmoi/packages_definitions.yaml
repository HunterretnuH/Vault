# Main
cosmic: {} # already installed with OS
i3:
    apt: [ i3, i3blocks, rofi, picom, feh, xclip ]
interception-tools:
    nix: [ interception-tools, interception-tools-plugins.dual-function-keys ]
nix: {}    # chezmoiscript (automatic installation)
nix_gl_mesa:
    nix: [ nixgl.nixGLMesa ]
nodejs:
    apt: [ npm, nodejs ]
python:
    apt: [ python3, python3-pip, python3-venv ]
terminal_base:
    nix: [ nix, fd, fzf, ripgrep, zoxide, neovim, neovim-remote, yazi, uv, starship, tmux ]
    apt: [ curl, trash-cli, pv, nfs-common, cifs-utils, gdb, git, npm ]
wireguard:
    apt: [ wireguard ]
# GUI programs
keepassxc:
    apt: [ keepassxc ]
kitty:
    nix: [ kitty ]
libreoffice:
    apt: [ libreoffice ]
nextcloud:
    nix: [ nextcloud-client ]
# Included in compound features
feh:
    apt: [ feh ]
git:
    apt: [ git ]
nvim:
    nix: [ neovim, neovim-remote ]
    apt: [ nix ]
ranger:
    nix: [ ranger ]
starship:
    nix: [ starship ]
yazi:
    nix: [ yazi ]
# Scripts
fonts: {
    script: [ install_fonts.sh ]
}
fix_xdg_dirs: {
    script: [ fix_xdg_dirs.sh ]
}
vscode: {
    script: [ install_vscode.sh ]
}
# Samba shares
smb_share: {}
smb_share_nas_gamepc:
    script: [ enable_daemon_mnt_Remote_NAS_GamePC.sh ]
smb_share_nas_media_family:
    script: [ enable_daemon_mnt_Remote_NAS_Media_Family.sh ]
smb_share_nas_media_general:
    script: [ enable_daemon_mnt_Remote_NAS_Media_General.sh ]
smb_share_nas_storage:
    script: [ enable_daemon_mnt_Remote_NAS_Storage.sh ]
smb_share_nas_wiki:
    script: [ enable_daemon_mnt_Remote_NAS_Wiki.sh ]
smb_share_nas_wiki_work:
    script: [ enable_daemon_mnt_Remote_NAS_Wiki_DevWiki.sh, enable_daemon_mnt_Remote_NAS_Wiki_MmanWiki.sh ]
# Custom machine packages
home_notebook:
    apt: [ gThumb, easyeffects, wl-clipboard ]
work_vm:
    apt: [ virtualbox-guest-x11 ]


